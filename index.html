<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Reader – RSVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(20, 20, 40, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 215, 100, 0.15);
        }
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #ffdd77;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.3);
            margin-bottom: 20px;
        }
        .word-display {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 50px 20px;
            margin-bottom: 25px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 1px solid rgba(255, 215, 100, 0.1);
            transition: all 0.2s;
        }
        #word {
            font-size: 48px;
            font-weight: 700;
            color: #ffdd88;
            text-shadow: 0 0 30px rgba(255, 200, 100, 0.5);
            line-height: 1.3;
            transition: transform 0.15s ease;
            word-break: break-word;
        }
        #word.pulse {
            transform: scale(1.06);
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .controls button {
            background: rgba(255, 215, 100, 0.15);
            border: 1px solid rgba(255, 215, 100, 0.3);
            color: #ffdd77;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            min-width: 100px;
            backdrop-filter: blur(4px);
        }
        .controls button:hover {
            background: rgba(255, 215, 100, 0.25);
            border-color: #ffdd77;
            transform: scale(1.02);
        }
        .controls button:active {
            transform: scale(0.95);
        }
        .controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 100, 0.15);
        }
        .speed-control label {
            color: #88aaff;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .speed-control input[type="range"] {
            width: 140px;
            height: 4px;
            -webkit-appearance: none;
            background: #445577;
            border-radius: 2px;
            outline: none;
        }
        .speed-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffdd77;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 200, 100, 0.4);
        }
        .speed-control #speed-value {
            color: #ffdd77;
            font-weight: bold;
            font-size: 18px;
            min-width: 45px;
            text-align: center;
        }
        .progress {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0 20px;
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            background: #2a2a44;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffdd77, #ffaa55);
            transition: width 0.2s ease;
        }
        .progress-text {
            color: #88aadd;
            font-size: 14px;
            font-family: monospace;
            min-width: 70px;
            text-align: right;
        }
        .textarea-section {
            margin-top: 20px;
        }
        .textarea-section label {
            display: block;
            color: #88aaff;
            font-size: 14px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .textarea-section textarea {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 215, 100, 0.15);
            border-radius: 16px;
            padding: 14px;
            color: #ccddff;
            font-size: 14px;
            font-family: 'Georgia', serif;
            resize: vertical;
            outline: none;
            transition: border 0.2s;
        }
        .textarea-section textarea:focus {
            border-color: #ffdd77;
        }
        .textarea-section .buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .textarea-section .buttons button {
            background: rgba(100, 150, 255, 0.15);
            border: 1px solid rgba(100, 150, 255, 0.2);
            color: #88aaff;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: normal;
        }
        .textarea-section .buttons button:hover {
            background: rgba(100, 150, 255, 0.25);
        }
        .info {
            margin-top: 20px;
            font-size: 13px;
            color: #667799;
            text-align: center;
            border-top: 1px solid rgba(255, 215, 100, 0.05);
            padding-top: 15px;
        }
        .info span {
            color: #88aadd;
        }
        @media (max-width: 600px) {
            #word { font-size: 32px; }
            .controls { flex-direction: column; }
            .speed-control { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ Speed Reader ⚡</h1>
    <div class="word-display">
        <div id="word">📖</div>
    </div>

    <div class="controls">
        <button id="startBtn">▶ Start</button>
        <button id="pauseBtn" disabled>⏸ Pause</button>
        <button id="resetBtn">⟳ Reset</button>
        <div class="speed-control">
            <label for="speedSlider">Speed</label>
            <input type="range" id="speedSlider" min="50" max="800" value="250" step="10">
            <span id="speed-value">250</span>
            <span style="color:#667799; font-size:13px;">wpm</span>
        </div>
    </div>

    <div class="progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">0 / 0</div>
    </div>

    <div class="textarea-section">
        <label for="textInput">📝 Paste your text here (e.g., a chapter from a book):</label>
        <textarea id="textInput" placeholder="Copy and paste your text...">On the first day I lose my sense of time, my dignity and a molar. But I do have two children now and a cat. I’ve forgotten their names apart from the cat’s – Fräulein Tinky. I’ve got a husband too. He’s tall, with short, dark hair and grey eyes. I look at him from the corner of my eye as I sit huddled next to him on the threadbare sofa. In his embrace, the injuries running right down my back are throbbing, as if each of them had their own heartbeat. A cut on my forehead is stinging. From time to time everything goes blank or I see white flashes. Then I just focus on trying to breathe. It’s hard to tell whether it is actually evening, or whether he’s decided that’s what it is. Insulation panels are screwed over the windows. He creates day and night. Like God. I try to persuade myself I’m already over the worst, but I can’t stop anticipating that we’ll be going to bed together soon. The children already have their pyjamas on. The boy’s are too small, whereas the girl’s sleeves go way over her wrists. The children kneel on the floor a couple metres from the sofa and hold their hands up to feel the residual warmth of the wood-burning stove. The fire has burned down to a black heap, with only the odd ember still glowing red. The high-pitched voices with their jolly chitter-chatter blend into the sheer abnormality of this situation. I can’t understand exactly what they’re saying. It’s as if I’m hearing them talk through cotton wool, while I contemplate how I’m going to kill their father.</textarea>
        <div class="buttons">
            <button id="loadSampleBtn">📚 Load sample (book opening)</button>
            <button id="applyTextBtn">✅ Apply text</button>
        </div>
    </div>

    <div class="info">
        <span>🧠 Read word by word</span> · Press <span>Start</span> and follow · Adjust speed in real time · <span>Space</span> to pause/resume · <span>R</span> to reset
    </div>
</div>

<script>
    (function(){
        const wordEl = document.getElementById('word');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speed-value');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const textInput = document.getElementById('textInput');
        const loadSampleBtn = document.getElementById('loadSampleBtn');
        const applyTextBtn = document.getElementById('applyTextBtn');

        let words = [];
        let currentIndex = 0;
        let timerId = null;
        let isPaused = false;
        let isRunning = false;
        let speed = 250;

        const sampleText = `On the first day I lose my sense of time, my dignity and a molar. But I do have two children now and a cat. I’ve forgotten their names apart from the cat’s – Fräulein Tinky. I’ve got a husband too. He’s tall, with short, dark hair and grey eyes. I look at him from the corner of my eye as I sit huddled next to him on the threadbare sofa. In his embrace, the injuries running right down my back are throbbing, as if each of them had their own heartbeat. A cut on my forehead is stinging. From time to time everything goes blank or I see white flashes. Then I just focus on trying to breathe. It’s hard to tell whether it is actually evening, or whether he’s decided that’s what it is. Insulation panels are screwed over the windows. He creates day and night. Like God. I try to persuade myself I’m already over the worst, but I can’t stop anticipating that we’ll be going to bed together soon. The children already have their pyjamas on. The boy’s are too small, whereas the girl’s sleeves go way over her wrists. The children kneel on the floor a couple metres from the sofa and hold their hands up to feel the residual warmth of the wood-burning stove. The fire has burned down to a black heap, with only the odd ember still glowing red. The high-pitched voices with their jolly chitter-chatter blend into the sheer abnormality of this situation. I can’t understand exactly what they’re saying. It’s as if I’m hearing them talk through cotton wool, while I contemplate how I’m going to kill their father.`;

        function setText(text) {
            const raw = text.replace(/\s+/g, ' ').trim();
            if (!raw) { words = []; return; }
            const tokens = raw.match(/[\w']+|[.,!?;:]/g);
            if (!tokens) { words = []; return; }
            let merged = [];
            let buffer = '';
            for (let t of tokens) {
                if (t.match(/[.,!?;:]/)) {
                    if (buffer) {
                        merged.push(buffer + t);
                        buffer = '';
                    } else {
                        merged.push(t);
                    }
                } else {
                    if (buffer) {
                        merged.push(buffer);
                        buffer = t;
                    } else {
                        buffer = t;
                    }
                }
            }
            if (buffer) merged.push(buffer);
            words = merged;
        }

        function updateProgress() {
            const total = words.length;
            const current = Math.min(currentIndex, total);
            const pct = total > 0 ? (current / total) * 100 : 0;
            progressFill.style.width = pct + '%';
            progressText.textContent = `${current} / ${total}`;
        }

        function displayWord(index) {
            if (index >= words.length) {
                stopReading();
                wordEl.textContent = '🎉 The End!';
                wordEl.classList.remove('pulse');
                return;
            }
            const w = words[index];
            wordEl.textContent = w;
            wordEl.classList.add('pulse');
            setTimeout(() => wordEl.classList.remove('pulse'), 150);
            currentIndex = index + 1;
            updateProgress();
        }

        function stopReading() {
            if (timerId) { clearTimeout(timerId); timerId = null; }
            isRunning = false;
            isPaused = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '⏸ Pause';
        }

        function startReading() {
            if (words.length === 0) {
                alert('No text loaded. Please paste some text or load the sample.');
                return;
            }
            if (isRunning && !isPaused) return;
            if (isRunning && isPaused) {
                isPaused = false;
                pauseBtn.textContent = '⏸ Pause';
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                readNext();
                return;
            }
            if (currentIndex >= words.length) {
                currentIndex = 0;
                updateProgress();
            }
            isRunning = true;
            isPaused = false;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            pauseBtn.textContent = '⏸ Pause';
            readNext();
        }

        function readNext() {
            if (!isRunning || isPaused) return;
            if (currentIndex >= words.length) {
                stopReading();
                wordEl.textContent = '🏁 Finished';
                return;
            }
            displayWord(currentIndex);
            const interval = 60000 / speed;
            timerId = setTimeout(() => { readNext(); }, interval);
        }

        function pauseReading() {
            if (!isRunning || isPaused) return;
            isPaused = true;
            if (timerId) { clearTimeout(timerId); timerId = null; }
            pauseBtn.textContent = '▶ Resume';
            startBtn.disabled = true;
            pauseBtn.disabled = false;
        }

        function resetReading() {
            stopReading();
            currentIndex = 0;
            updateProgress();
            wordEl.textContent = '📖';
            wordEl.classList.remove('pulse');
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '⏸ Pause';
            isRunning = false;
            isPaused = false;
        }

        function applyText() {
            resetReading();
            const txt = textInput.value;
            setText(txt);
            if (words.length === 0) {
                wordEl.textContent = '❌ No valid text';
                updateProgress();
            } else {
                wordEl.textContent = '📖 Ready';
                updateProgress();
            }
        }

        function loadSample() {
            textInput.value = sampleText;
            applyText();
        }

        startBtn.addEventListener('click', startReading);
        pauseBtn.addEventListener('click', function() {
            if (isPaused) { startReading(); } else { pauseReading(); }
        });
        resetBtn.addEventListener('click', resetReading);

        speedSlider.addEventListener('input', function() {
            speed = parseInt(this.value);
            speedValue.textContent = speed;
            if (isRunning && !isPaused) {
                if (timerId) { clearTimeout(timerId); timerId = null; }
                readNext();
            }
        });

        applyTextBtn.addEventListener('click', applyText);
        loadSampleBtn.addEventListener('click', loadSample);

        loadSample();

        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                if (isRunning && !isPaused) pauseReading();
                else if (isRunning && isPaused) startReading();
                else startReading();
            }
            if (e.key === 'r' || e.key === 'R') resetReading();
        });

        updateProgress();
    })();
</script>
</body>
</html>
