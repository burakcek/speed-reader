            #word { font-size: 32px; }

Vacuum Decay and Islamic Eschatology: A Conceptual
Comparative Analysis
Abstract
The discovery of the Higgs boson at the Large Hadron Collider in 2012 conﬁrmed a central
prediction of the Standard Model of particle physics (ATLAS Collaboration, 2012). However, the
measuredmass of approximately 125 GeV also sharpened a preexisting theoretical concern:
when this value is combined with precisionmeasurements of the top-quarkmass, the running
of the Higgs quartic coupling becomes negative at energy scales well above the electroweak
scale, suggesting that the present vacuum is not the absolute ground state of the theory
(Degrassi et al., 2012; Espinosa et al., 2013). The electroweak vacuummay instead be a
metastable localminimum — stable against small perturbations but susceptible in principle to
quantum tunneling into a deeper, lower-energy conﬁguration (Buttazzo et al., 2013).
The formalism for this process was established by Coleman (1977) and extended to include
gravitational eﬀects by Coleman and De Luccia (1980). In the Coleman–De Lucciamodel,
vacuum decay proceeds through the nucleation of a bubble of true vacuum, which
subsequently expands at or near the speed of light. The interior of the bubble constitutes a
region in which the constants and interactions governing present physics no longer apply
(Coleman & De Luccia, 1980). No precursor signal propagates ahead of the bubble wall; the
process is therefore undetectable in advance by any observer within the false vacuum
(Tegmark, 2014).
Islamic eschatology presents a theologically rich account of the termination of the present
world. The Qur'an contains numerous passages describing the dissolution of cosmic structures
at the end of time, including the extinguishing of stars, the splitting of the sky, and the
transformation of the earth itself (Qur'an 81:1–2; 84:1; 14:48). The hour of this termination —
referred to in Islamic sources as As-Sa'a — is explicitly placed beyond human or angelic
knowledge and reserved to God alone (Qur'an 31:34; 7:187). Islamic theology further articulates
this doctrine through selected Divine Names, including Al-Haﬁz (the Preserver), Al-Qayyum
(the Self-Sustaining), Al-Qabid (the Constrictor), and Al-Akhir (the Last), each of which carries
implications for the governance and ultimate termination of the created order (Nasr, 1996; Ar-
Razi, 12th century/2000).
The central research question of this paper is: To what extent do the physical model of vacuum
decay and the Islamic eschatological framework display conceptual parallelism, and what are the
theological and scientiﬁc implications of any such parallelism?
The thesis is twofold. First, the two frameworks share ﬁve structural features that are nontrivial
— that is, features that are not common to all end-of-universe scenarios and that are therefore
not the result of superﬁcial comparison. Second, the frameworks diverge at three fundamental
ontological points, and these divergencesmust be accurately characterized in order for the
comparison to remain intellectually honest andmethodologically sound.

1.2 Research Question and Thesis
This paper does not argue that the Qur'an anticipates Coleman–De Luccia tunneling as a
technicalmatter. It does not claim that the statistical probability of vacuum decay within a
ﬁnite time is theologically signiﬁcant. It addresses conceptual structure, not empirical
conﬁrmation. The comparison is conducted at the level of the categories employed by each
framework — not at the level ofmathematical formalism on the physics side or of detailed
juridical or hadith scholarship on the theology side.
In quantum ﬁeld theory, the vacuum is deﬁned as the lowest-energy state of a quantum ﬁeld in
a given region of ﬁeld conﬁguration space (Coleman, 1977). A false vacuum is a localminimum
of the eﬀective potential that is not the globalminimum: it is stable against small perturbations
but thermodynamically and quantummechanically susceptible to decay into a lower-energy
state (Coleman, 1977). The concept of a true vacuum designates the globalminimum — the state
of lowest possible energy within the theory.
The distinction between false and true vacuum becomes physically signiﬁcant when quantum
tunneling is considered. Even in the absence of suﬃcient thermal energy to overcome the
potential barrier separating the twominima, quantummechanics permits a nonzero
probability of barrier penetration — a process that has no classical analogue (Coleman, 1977).
For the electroweak vacuum, this probability is extraordinarily small per unit volume per unit
time under current parameter estimates, but it is not zero (Degrassi et al., 2012; Buttazzo et al.,
2013).
The electroweak symmetry-breaking sector of the Standard Model is governed by the Higgs
potential. The stability of this potential at high ﬁeld values depends sensitively on the value of
the Higgs quartic coupling and its running under the renormalization group equations
(Degrassi et al., 2012). The Higgs quartic coupling is itself determined at low energies by the
Higgs bosonmass, while its running is strongly inﬂuenced by the top Yukawa coupling and
hence by the top-quarkmass (Espinosa et al., 2013).
Currentmeasurements place the Higgs bosonmass at approximately 125.09 GeV and the top-
quarkmass near 172.4 GeV (ATLAS Collaboration, 2012; Degrassi et al., 2012). Under these
values, the Higgs quartic coupling runs to negative values at a renormalization scale of
approximately 10¹⁰ GeV, generating a secondaryminimum in the eﬀective potential at very
large ﬁeld values (Degrassi et al., 2012; Buttazzo et al., 2013). The present electroweak vacuum is
therefore likelymetastable rather than absolutely stable, though with a lifetime estimated to be
many orders ofmagnitude longer than the present age of the universe (Espinosa et al., 2013).

    <div class="info">

<script>
    (function(){
        const wordEl = document.getElementById('word');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speed-value');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const textInput = document.getElementById('textInput');
        const loadSampleBtn = document.getElementById('loadSampleBtn');
        const applyTextBtn = document.getElementById('applyTextBtn');

        let words = [];
        let currentIndex = 0;
        let timerId = null;
        let isPaused = false;
        let isRunning = false;
        let speed = 250;

        const sampleText = `On the first day I lose my sense of time, my dignity and a molar. But I do have two children now and a cat. I’ve forgotten their names apart from the cat’s – Fräulein Tinky. I’ve got a husband too. He’s tall, with short, dark hair and grey eyes. I look at him from the corner of my eye as I sit huddled next to him on the threadbare sofa. In his embrace, the injuries running right down my back are throbbing, as if each of them had their own heartbeat. A cut on my forehead is stinging. From time to time everything goes blank or I see white flashes. Then I just focus on trying to breathe. It’s hard to tell whether it is actually evening, or whether he’s decided that’s what it is. Insulation panels are screwed over the windows. He creates day and night. Like God. I try to persuade myself I’m already over the worst, but I can’t stop anticipating that we’ll be going to bed together soon. The children already have their pyjamas on. The boy’s are too small, whereas the girl’s sleeves go way over her wrists. The children kneel on the floor a couple metres from the sofa and hold their hands up to feel the residual warmth of the wood-burning stove. The fire has burned down to a black heap, with only the odd ember still glowing red. The high-pitched voices with their jolly chitter-chatter blend into the sheer abnormality of this situation. I can’t understand exactly what they’re saying. It’s as if I’m hearing them talk through cotton wool, while I contemplate how I’m going to kill their father.`;

        function setText(text) {
            const raw = text.replace(/\s+/g, ' ').trim();
            if (!raw) { words = []; return; }
            const tokens = raw.match(/[\w']+|[.,!?;:]/g);
            if (!tokens) { words = []; return; }
            let merged = [];
            let buffer = '';
            for (let t of tokens) {
                if (t.match(/[.,!?;:]/)) {
                    if (buffer) {
                        merged.push(buffer + t);
                        buffer = '';
                    } else {
                        merged.push(t);
                    }
                } else {
                    if (buffer) {
                        merged.push(buffer);
                        buffer = t;
                    } else {
                        buffer = t;
                    }
                }
            }
            if (buffer) merged.push(buffer);
            words = merged;
        }

        function updateProgress() {
            const total = words.length;
            const current = Math.min(currentIndex, total);
            const pct = total > 0 ? (current / total) * 100 : 0;
            progressFill.style.width = pct + '%';
            progressText.textContent = `${current} / ${total}`;
        }

        function displayWord(index) {
            if (index >= words.length) {
                stopReading();
                wordEl.textContent = '🎉 The End!';
                wordEl.classList.remove('pulse');
                return;
            }
            const w = words[index];
            wordEl.textContent = w;
            wordEl.classList.add('pulse');
            setTimeout(() => wordEl.classList.remove('pulse'), 150);
            currentIndex = index + 1;
            updateProgress();
        }

        function stopReading() {
            if (timerId) { clearTimeout(timerId); timerId = null; }
            isRunning = false;
            isPaused = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '⏸ Pause';
        }

        function startReading() {
            if (words.length === 0) {
                alert('No text loaded. Please paste some text or load the sample.');
                return;
            }
            if (isRunning && !isPaused) return;
            if (isRunning && isPaused) {
                isPaused = false;
                pauseBtn.textContent = '⏸ Pause';
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                readNext();
                return;
            }
            if (currentIndex >= words.length) {
                currentIndex = 0;
                updateProgress();
            }
            isRunning = true;
            isPaused = false;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            pauseBtn.textContent = '⏸ Pause';
            readNext();
        }

        function readNext() {
            if (!isRunning || isPaused) return;
            if (currentIndex >= words.length) {
                stopReading();
                wordEl.textContent = '🏁 Finished';
                return;
            }
            displayWord(currentIndex);
            const interval = 60000 / speed;
            timerId = setTimeout(() => { readNext(); }, interval);
        }

        function pauseReading() {
            if (!isRunning || isPaused) return;
            isPaused = true;
            if (timerId) { clearTimeout(timerId); timerId = null; }
            pauseBtn.textContent = '▶ Resume';
            startBtn.disabled = true;
            pauseBtn.disabled = false;
        }

        function resetReading() {
            stopReading();
            currentIndex = 0;
            updateProgress();
            wordEl.textContent = '📖';
            wordEl.classList.remove('pulse');
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '⏸ Pause';
            isRunning = false;
            isPaused = false;
        }

        function applyText() {
            resetReading();
            const txt = textInput.value;
            setText(txt);
            if (words.length === 0) {
                wordEl.textContent = '❌ No valid text';
                updateProgress();
            } else {
                wordEl.textContent = '📖 Ready';
                updateProgress();
            }
        }

        function loadSample() {
            textInput.value = sampleText;
            applyText();
        }

        startBtn.addEventListener('click', startReading);
        pauseBtn.addEventListener('click', function() {
            if (isPaused) { startReading(); } else { pauseReading(); }
        });
        resetBtn.addEventListener('click', resetReading);

        speedSlider.addEventListener('input', function() {
            speed = parseInt(this.value);
            speedValue.textContent = speed;
            if (isRunning && !isPaused) {
                if (timerId) { clearTimeout(timerId); timerId = null; }
                readNext();
            }
        });

        applyTextBtn.addEventListener('click', applyText);
        loadSampleBtn.addEventListener('click', loadSample);

        loadSample();

        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                if (isRunning && !isPaused) pauseReading();
                else if (isRunning && isPaused) startReading();
                else startReading();
            }
            if (e.key === 'r' || e.key === 'R') resetReading();
        });

        updateProgress();
    })();
</script>
