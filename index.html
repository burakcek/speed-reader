Contemporary theoretical physics indicates that the electroweak vacuum of the Standard Model may be metastable rather than absolutely stable. Measurements of the Higgs boson mass at approximately 125 GeV, combined with top-quark mass data, place the present vacuum close to the boundary between stability and instability (Degrassi et al., 2012; Buttazzo et al., 2013). This configuration admits the theoretical possibility of vacuum decay — a transition from the present false vacuum to a lower-energy true vacuum via quantum tunneling, formalized in the Coleman–De Luccia framework (Coleman & De Luccia, 1980). Were such a transition to occur, it would propagate at the speed of light, restructuring the fundamental constants and interaction structure of physics within the expanding bubble (Coleman, 1977).

Islamic eschatology, grounded in the Qur'an and authenticated hadith literature, describes the present cosmic order as provisional and subject to a sudden, universal, and irreversible termination at a moment known only to God (Smith & Haddad, 2002; Günther, 2020). This paper conducts a systematic conceptual comparison between the physical model of vacuum decay and the Islamic eschatological framework. It does not advance a concordist claim — that is, it does not assert that Qur'anic texts contain or predict specific results of quantum field theory. Rather, it investigates whether the two frameworks are conceptually coherent, and what the implications of that coherence are for the broader dialogue between Islamic theology and natural science.

Five structural convergences are identified: unpredictability of onset, suddenness, irreversibility, universality of scope, and the provisional ontological status of the present world. Three fundamental divergences are equally identified: the absence of teleology in the physical model, the absence of a divine agent in physical theory, and the absence of any post-cosmic continuation in the vacuum decay scenario. The conclusion is that vacuum decay constitutes a scientifically serious structural analogue to Islamic eschatological doctrine, supporting a complementarity model of the theology-science relationship rather than either conflict or identity.

Vacuum Decay and Islamic Eschatology: A Conceptual Comparative Analysis

Abstract

The discovery of the Higgs boson at the Large Hadron Collider in 2012 confirmed a central prediction of the Standard Model of particle physics (ATLAS Collaboration, 2012). However, the measured mass of approximately 125 GeV also sharpened a preexisting theoretical concern: when this value is combined with precision measurements of the top-quark mass, the running of the Higgs quartic coupling becomes negative at energy scales well above the electroweak scale, suggesting that the present vacuum is not the absolute ground state of the theory (Degrassi et al., 2012; Espinosa et al., 2013). The electroweak vacuum may instead be a metastable local minimum — stable against small perturbations but susceptible in principle to quantum tunneling into a deeper, lower-energy configuration (Buttazzo et al., 2013).

The formalism for this process was established by Coleman (1977) and extended to include gravitational effects by Coleman and De Luccia (1980). In the Coleman–De Luccia model, vacuum decay proceeds through the nucleation of a bubble of true vacuum, which subsequently expands at or near the speed of light. The interior of the bubble constitutes a region in which the constants and interactions governing present physics no longer apply (Coleman & De Luccia, 1980). No precursor signal propagates ahead of the bubble wall; the process is therefore undetectable in advance by any observer within the false vacuum (Tegmark, 2014).

Islamic eschatology presents a theologically rich account of the termination of the present world. The Qur'an contains numerous passages describing the dissolution of cosmic structures at the end of time, including the extinguishing of stars, the splitting of the sky, and the transformation of the earth itself (Qur'an 81:1–2; 84:1; 14:48). The hour of this termination — referred to in Islamic sources as As-Sa'a — is explicitly placed beyond human or angelic knowledge and reserved to God alone (Qur'an 31:34; 7:187). Islamic theology further articulates this doctrine through selected Divine Names, including Al-Hafiz (the Preserver), Al-Qayyum (the Self-Sustaining), Al-Qabid (the Constrictor), and Al-Akhir (the Last), each of which carries implications for the governance and ultimate termination of the created order (Nasr, 1996; Ar-Razi, 12th century/2000).

The central research question of this paper is: To what extent do the physical model of vacuum decay and the Islamic eschatological framework display conceptual parallelism, and what are the theological and scientific implications of any such parallelism?

The thesis is twofold. First, the two frameworks share five structural features that are nontrivial — that is, features that are not common to all end-of-universe scenarios and that are therefore not the result of superficial comparison. Second, the frameworks diverge at three fundamental ontological points, and these divergences must be accurately characterized in order for the comparison to remain intellectually honest and methodologically sound.

This paper does not argue that the Qur'an anticipates Coleman–De Luccia tunneling as a technical matter. It does not claim that the statistical probability of vacuum decay within a finite time is theologically significant. It addresses conceptual structure, not empirical confirmation. The comparison is conducted at the level of the categories employed by each framework — not at the level of mathematical formalism on the physics side or of detailed juridical or hadith scholarship on the theology side.

In quantum field theory, the vacuum is defined as the lowest-energy state of a quantum field in a given region of field configuration space (Coleman, 1977). A false vacuum is a local minimum of the effective potential that is not the global minimum: it is stable against small perturbations but thermodynamically and quantum mechanically susceptible to decay into a lower-energy state (Coleman, 1977). The concept of a true vacuum designates the global minimum — the state of lowest possible energy within the theory.

The distinction between false and true vacuum becomes physically significant when quantum tunneling is considered. Even in the absence of sufficient thermal energy to overcome the potential barrier separating the two minima, quantum mechanics permits a nonzero probability of barrier penetration — a process that has no classical analogue (Coleman, 1977). For the electroweak vacuum, this probability is extraordinarily small per unit volume per unit time under current parameter estimates, but it is not zero (Degrassi et al., 2012; Buttazzo et al., 2013).

The electroweak symmetry-breaking sector of the Standard Model is governed by the Higgs potential. The stability of this potential at high field values depends sensitively on the value of the Higgs quartic coupling and its running under the renormalization group equations (Degrassi et al., 2012). The Higgs quartic coupling is itself determined at low energies by the Higgs boson mass, while its running is strongly influenced by the top Yukawa coupling and hence by the top-quark mass (Espinosa et al., 2013).

Current measurements place the Higgs boson mass at approximately 125.09 GeV and the top-quark mass near 172.4 GeV (ATLAS Collaboration, 2012; Degrassi et al., 2012). Under these values, the Higgs quartic coupling runs to negative values at a renormalization scale of approximately 10¹⁰ GeV, generating a secondary minimum in the effective potential at very large field values (Degrassi et al., 2012; Buttazzo et al., 2013). The present electroweak vacuum is therefore likely metastable rather than absolutely stable, though with a lifetime estimated to be many orders of magnitude longer than the present age of the universe (Espinosa et al., 2013).

        let words = [];               // низа од зборови

        function getWordsFromText(text) {

            return text.split(/\s+/).filter(w => w.length > 0);

        function updateProgress() {
            const total = words.length;
            const current = currentIndex + 1;
            if (total === 0) {
                progressFill.style.width = '0%';
                progressText.textContent = '0 / 0';
                return;
            }
            const pct = Math.min((current / total) * 100, 100);
            progressFill.style.width = pct + '%';
            progressText.textContent = `${Math.min(current, total)} / ${total}`;
            statWords.textContent = `Зборови: ${total}`;
        }

        function updateStats() {
            if (isRunning && !isPaused) {
                const now = Date.now();
                elapsedSeconds = Math.floor((now - startTime) / 1000);
            }
            const mins = Math.floor(elapsedSeconds / 60);
            const secs = elapsedSeconds % 60;
            statTime.textContent = `Време: ${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function showWord(index) {
            if (!words.length) {
                wordDisplay.textContent = '📚 Внесете текст!';
                return;
            }
            if (index >= words.length) {
                // Заврши
                stopReading();
                wordDisplay.textContent = '🏁 Крај на книгата!';
                wordDisplay.className = '';
                return;
            }
            const word = words[index];
            wordDisplay.textContent = word;
            wordDisplay.className = '';
            // мал ефект на пулс
            setTimeout(() => {
                wordDisplay.classList.add('pulse');
            }, 50);
            setTimeout(() => {
                wordDisplay.classList.remove('pulse');
            }, 150);
            currentIndex = index;
            updateProgress();
            updateStats();

        function startReading() {

            const text = textarea.value.trim();

            const newWords = getWordsFromText(text);
            // Провери дали е променет текстот – ако е, ресетирај
            if (JSON.stringify(newWords) !== JSON.stringify(words)) {

            if (words.length === 0) {

            if (!isRunning || isPaused) return;
            isPaused = true;
            btnPause.textContent = '▶ Продолжи';
            if (timer) clearInterval(timer);
            timer = null;
            // зачувај го истекот
            elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        }

        function resumeReading() {
            if (!isRunning || !isPaused) return;
            isPaused = false;
            btnPause.textContent = '⏸ Пауза';
            startTime = Date.now() - elapsedSeconds * 1000;
            const speed = parseInt(speedSlider.value);
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                if (isPaused) return;
                const next = currentIndex + 1;
                if (next >= words.length) {
                    stopReading();
                    wordDisplay.textContent = '🏁 Крај на книгата!';
                    wordDisplay.className = '';
                    return;
                }
                showWord(next);
            }, 60000 / speed);
        }

        function stopReading() {
            isRunning = false;
            isPaused = false;
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            btnStart.textContent = '▶ Старт';
            btnPause.textContent = '⏸ Пауза';
            // не го ресетираме индексот – останува каде што е
            // само запираме
        }

        function resetReading() {
            stopReading();
            currentIndex = 0;
            elapsedSeconds = 0;
            startTime = 0;
            updateProgress();
            updateStats();
            if (words.length) {
                showWord(0);
            } else {
                wordDisplay.textContent = '📚';
            }
            btnStart.textContent = '▶ Старт';
            btnPause.textContent = '⏸ Пауза';
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 6. Поврзување на настани
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        btnStart.addEventListener('click', startReading);

        btnPause.addEventListener('click', function() {
            if (!isRunning) return;
            if (isPaused) {
                resumeReading();
            } else {
                pauseReading();
            }
        });

        btnStop.addEventListener('click', function() {
            if (!isRunning) return;
            stopReading();
            // прикажи го тековниот збор без ефекти
            if (words.length && currentIndex < words.length) {
                wordDisplay.textContent = words[currentIndex];
                wordDisplay.className = '';
            } else {
                wordDisplay.textContent = '⏹ Застанато';
            }
        });

        speedSlider.addEventListener('input', function() {
            const val = this.value;
            speedDisplay.textContent = val;
            // Ако читањето е активно и не е паузирано, ресетирај го тајмерот
            if (isRunning && !isPaused) {
                // ресетирај го интервалот со нова брзина
                if (timer) {
                    clearInterval(timer);
                    timer = null;
                }
                const speed = parseInt(val);
                timer = setInterval(() => {
                    if (isPaused) return;
                    const next = currentIndex + 1;
                    if (next >= words.length) {
                        stopReading();
                        wordDisplay.textContent = '🏁 Крај на книгата!';
                        wordDisplay.className = '';
                        return;
                    }
                    showWord(next);
                }, 60000 / speed);
            }
        });

        // Ако се промени текстот, ресетирај
        textarea.addEventListener('input', function() {
            if (isRunning) {
                stopReading();
                resetReading();
            }
            // повторно парсирај
            const text = this.value.trim();
            words = getWordsFromText(text);
            currentIndex = 0;
            elapsedSeconds = 0;
            updateProgress();
            updateStats();
            if (words.length) {
                showWord(0);
            } else {
                wordDisplay.textContent = '📚';
                progressFill.style.width = '0%';
                progressText.textContent = '0 / 0';
            }
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 7. Иницијализација
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        (function init() {
            const text = textarea.value.trim();
            words = getWordsFromText(text);
            currentIndex = 0;
            elapsedSeconds = 0;
            updateProgress();
            updateStats();
            if (words.length) {
                showWord(0);
            } else {
                wordDisplay.textContent = '📚';
            }
            // Подреди го лизгачот
            speedDisplay.textContent = speedSlider.value;
        })();

        // ─── кратенка: Space за пауза/продолжи ───
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA') return;
            if (e.key === ' ') {
                e.preventDefault();
                if (!isRunning) {
                    startReading();
                } else if (isPaused) {
                    resumeReading();
                } else {
                    pauseReading();
                }
            }
            if (e.key === 'r' || e.key === 'R') {
                resetReading();
            }
        });

        console.log('📖 Читач на книги · Притиснете SPACE за пауза/продолжи, R за рестарт');
    </script>

</body>
</html>
